<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline — Stocker</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #0A0E17;
        color: #E6EDF7;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        text-align: center;
        -webkit-font-smoothing: antialiased;
      }
      .card { max-width: 360px; }
      .dot {
        width: 44px;
        height: 44px;
        margin: 0 auto 20px;
        border-radius: 14px;
        background: #11182A;
        border: 1px solid #1E2A44;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .dot span {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #34D399;
        box-shadow: 0 0 14px 2px rgba(52, 211, 153, 0.6);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0;
        font-size: 14px;
        line-height: 1.6;
        color: #8B97AD;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="dot"><span></span></div>
      <h1>You're offline</h1>
      <p>Stocker needs a connection to fetch market data. Reconnect and try again.</p>
    </div>
  </body>
</html>
